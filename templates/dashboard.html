<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-card {
            background-color: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }

        .dashboard-card h1 {
            color: #333;
            font-size: 28px;
        }

        .dashboard-card p {
            font-size: 18px;
            color: #555;
            margin-top: 10px;
        }

        .logout-btn {
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #ff4b5c;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .logout-btn:hover {
            background-color: #e73d4a;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #eee;
            margin-bottom: 20px;
            display: inline-block;
            background: url('https://www.svgrepo.com/show/382106/account-avatar-profile-user-11.svg') no-repeat center center;
            background-size: 60%;
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <div class="avatar"></div>
        <h1>Welcome, {{ user }} 👋</h1>
        <p>You have successfully logged in using Face Recognition.</p>
        <form action="{{ url_for('logout') }}">
            <button class="logout-btn">Logout</button>
        </form>
    </div>
</body>
</html>
